services:
  backend:
    build:
      context: ./backend
    container_name: b2c-backend
    volumes:
      - ./backend:/app          # ホットリロード用
      - cad_data:/app/data      # 生成された CAD データの永続化
    env_file:
      - .env
    ports:
      - "8001:8000"             # ホスト 8001 (8000 は他で使用中)
    tty: true
    stdin_open: true

  test:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    command: ["python", "-m", "pytest", "-v"]
    profiles:
      - test

  frontend:
    build:
      context: ./frontend
    container_name: b2c-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000"             # ホスト 3001 (3000 は他で使用中)
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend

volumes:
  cad_data:
